<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nova Receita | SuperMarket</title>

  <link rel="stylesheet" href="novoReceita.css">
  <link rel="stylesheet" href="../../cssGeral.css">
  <link rel="stylesheet" href="/mobileMenu.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <button id="menuToggle" class="menu-toggle">☰</button>
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <h2>SuperMarket</h2>
    </div>
    <nav class="menu">
      <a href="/supermarket-main/inicio/dashboard.html">🏠 Dashboard</a>
        <a href="/supermarket-main/caixa/frenteCaixa.html">💳 Caixa</a>
        <a href="/supermarket-main/receitasProducao/receitasProducao.html">📋 Receitas / Produção</a>
        <a href="/supermarket-main/produtos/produtos.html">🛒 Produtos</a>
        <a href="/supermarket-main/estoque/estoque.html">📦 Estoque</a>
        <a href="/supermarket-main/vendas/vendas.html">💰 Vendas</a>
        <a href="/supermarket-main/cliente/clientes.html">👥 Clientes</a>
        <a href="/supermarket-main/relatorio/relatorios.html">📊 Relatórios</a>
        <a href="/supermarket-main/configuracoes/configuracoes.html">⚙️ Configurações</a>
    </nav>
  </aside>
  <main class="container">
  <form class="form-receita" id="formReceita">
    <div class="page-header">
      <h1>📋 Nova Receita</h1>
      <p>Cadastre uma receita para produção.</p>
    </div>
    <div class="grid">
      <div class="input-group">
        <label>Nome da Receita</label>
        <input
          type="text"
          id="nomeReceita"
          placeholder="Ex: Bolo de Chocolate">
      </div>
      <div class="input-group">
        <label>Categoria</label>
        <select id="categoriaReceita">
          <option value="">Selecione</option>
          <option>Bolo</option>
          <option>Torta</option>
          <option>Mousse</option>
          <option>Doce</option>
          <option>Salgado</option>
        </select>
      </div>
      <div class="input-group">
        <label>Unidade Produzida</label>
        <select id="unidadeProducao">
          <option value="UN">UN</option>
          <option value="KG">KG</option>
          <option value="L">L</option>
        </select>
      </div>
      <div class="input-group full">
        <label>Foto da Receita</label>
        <div class="upload-box">
          <input
            type="file"
            id="fotoReceita"
            accept="image/*">
        </div>
        <img
          id="previewImagem"
          src=""
          alt="Preview da Receita"
          style="display:none">
      </div>
    </div>
    <h2>🥣 Ingredientes</h2>
    <table class="ingredientes-table">
      <thead>
        <tr>
          <th>Ingrediente</th>
          <th>Quantidade</th>
          <th>Unidade</th>
          <th>Custo</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="ingredientes">
      </tbody>
    </table>
    <button type="button" class="btn-add" id="btnAddIngrediente">
      ➕ Adicionar Ingrediente
    </button>
    <h2>💰 Custos e Venda</h2>
    <div class="grid">
      <div class="input-group">
        <label>Custo da Receita (R$)</label>
        <input type="number" id="custoReceita" step="0.01" readonly>
      </div>
      <div class="input-group">
        <label>Margem de Lucro (%)</label>
        <input type="number" id="margemLucro" placeholder="50">
      </div>
      <div class="input-group">
        <label>Preço de Venda (R$)</label>
        <input type="number" id="precoVenda" step="0.01" readonly>
      </div>
    </div>
    <div class="buttons">
      <button type="submit" class="btn-save">
        💾 Salvar Receita
      </button>
      <button type="button" class="btn-cancel" onclick="history.back()">
        Cancelar
      </button>
    </div>
  </form>
</main>
  <script src="novoReceita.js"></script>
<script src="../../utils.js"></script>
</body>
</html>
