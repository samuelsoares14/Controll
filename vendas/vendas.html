<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vendas | SuperMarket</title>

    <link rel="stylesheet" href="vendas.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="/cssGeral.css">
    <link rel="stylesheet" href="/supermarket-main/mobileMenu.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <button id="menuToggle" class="menu-toggle">
        ☰
    </button>

    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">

        <div class="logo">
            <h2>SuperMarket</h2>
        </div>

        <nav class="menu">

            <a href="/supermarket-main/inicio/dashboard.html">🏠 Dashboard</a>
        <a href="/supermarket-main/caixa/frenteCaixa.html">💳 Caixa</a>
        <a href="/supermarket-main/receitasProducao/receitasProducao.html">📋 Receitas / Produção</a>
        <a href="/supermarket-main/produtos/produtos.html">🛒 Produtos</a>
        <a href="/supermarket-main/estoque/estoque.html">📦 Estoque</a>
        <a href="/supermarket-main/vendas/vendas.html">💰 Vendas</a>
        <a href="/supermarket-main/cliente/clientes.html">👥 Clientes</a>
        <a href="/supermarket-main/relatorio/relatorios.html">📊 Relatórios</a>
        <a href="/supermarket-main/configuracoes/configuracoes.html">⚙️ Configurações</a>

        </nav>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <!-- TOPBAR -->

        <header class="topbar">

            <h1>Controle de Vendas</h1>

        </header>

        <!-- CARDS -->

<section class="cards">

    <div class="card green">

        <div class="card-icon">
            💰
        </div>

        <div class="card-info">

            <h3>Valor</h3>

            <p id="vendasHoje">
                R$ 0,00
            </p>

        </div>

    </div>

    <div class="card blue">

        <div class="card-icon">
            📦
        </div>

        <div class="card-info">

            <h3>Pedidos</h3>

            <p id="totalPedidos">
                0
            </p>

        </div>

    </div>

    <div class="card orange">

        <div class="card-icon">
            📈
        </div>

        <div class="card-info">

            <h3>Ticket Médio</h3>

            <p id="ticketMedio">
                R$ 0,00
            </p>

        </div>

    </div>

    <div class="card red">

        <div class="card-icon">
            ❌
        </div>

        <div class="card-info">

            <h3>Canceladas</h3>

            <p id="vendasCanceladas">
                0
            </p>

        </div>

    </div>

</section>

<!-- BUSCA -->

<section class="search-bar">

    <input
        type="text"
        id="buscarVenda"
        placeholder="🔍 Buscar por ID, produto ou pagamento..."
    >

    <select id="filtroPeriodo">

        <option value="todos">
            Todas
        </option>

        <option value="hoje">
            Hoje
        </option>

        <option value="7dias">
            Últimos 7 dias
        </option>

        <option value="mes">
            Este mês
        </option>

    </select>

</section>

        <!-- TABELA -->

        <section class="table-section">

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Data</th>

                        <th>Itens</th>

                        <th>Total</th>

                        <th>Pagamento</th>

                        <th>Status</th>

                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody id="listaVendas">

                    <!-- vendas.js irá preencher -->

                </tbody>

            </table>

        </section>

        <div id="modalVenda" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Detalhes da Venda</h2>

            <button
                class="btn-fechar"
                onclick="fecharModalVenda()">

                ✕

            </button>

        </div>

        <div id="conteudoVenda">

        </div>

    </div>

</div>
    </main>

    <script src="../utils.js"></script>
    <script src="vendas.js"></script>

</body>
</html>
